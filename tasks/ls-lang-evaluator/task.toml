[metadata]
name = "ls-lang-evaluator"
description = "Create LangSmith evaluators for Python and TypeScript agents"
difficulty = "medium"
category = "langsmith"
tags = ["evaluator", "polyglot", "python", "typescript"]
default_treatments = [
    "LS_BASIC_PY",
    "LS_BASIC_TS",
    "LS_BASIC_BOTH",
    "LS_WORKFLOW_PY",
    "LS_WORKFLOW_TS",
    "LS_WORKFLOW_BOTH",
    "CONTROL",
]

[template]
# Variables substituted into instruction.md at runtime
required = ["py_dataset", "ts_dataset", "run_id"]

[environment]
description = "Polyglot workspace with backend/ (Python SQL analytics agent) and frontend/ (TypeScript support chatbot). Both agents already have LangSmith tracing. Pre-existing datasets contain example runs. Claude must create custom evaluators for both agents and upload to LangSmith."
dockerfile = "Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_evaluator_v2.py"
target_artifacts = ["backend", "frontend"]
timeout = 120

[setup]
# Template variables generated at runtime
[setup.template_vars]
py_dataset = "bench-sql-{run_id}"
ts_dataset = "bench-support-{run_id}"

# Upload datasets so Claude can inspect them (naming: {type}_*_dataset.json → bench-{type}-{run_id})
[[setup.data]]
pattern = "*_dataset.json"
handler = "upload_datasets"
