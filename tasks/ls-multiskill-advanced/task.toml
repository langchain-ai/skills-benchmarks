[metadata]
name = "ls-multiskill-advanced"
description = "Create trajectory dataset and evaluator from LangSmith traces"
difficulty = "hard"
category = "langsmith"
tags = ["multiskill", "trace", "dataset", "evaluator"]
default_treatments = ["LS_BASIC_PY", "LS_WORKFLOW_PY", "CONTROL"]

[template]
required = ["run_id"]

[environment]
description = "Clean Python workspace with langsmith SDK installed. Claude has access to a LangSmith project containing pre-existing traces from a SQL analytics agent. Task requires creating trajectory datasets and custom evaluators."
dockerfile = "Dockerfile"
timeout_sec = 900

[validation]
validators = ["DatasetStructureValidator", "EvaluatorValidator", "SkillScriptValidator", "TrajectoryAccuracyValidator"]
