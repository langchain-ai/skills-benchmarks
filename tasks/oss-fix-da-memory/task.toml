[metadata]
name = "oss-fix-da-memory"
description = "Fix memory routing and subagent configuration bugs"
difficulty = "medium"
category = "deepagents"
tags = ["memory", "subagents", "persistence", "bug-fix"]
default_treatments = [
    "CONTROL",
    "OSSS_DA_MEMORY_ONLY",
    "OSSS_DA_SUBAGENTS_ONLY",
    "OSSS_DA_MEMORY_AND_SUBAGENTS",
    "OSSS_ALL_DA",
    "OSSS_ALL_LG",
    "OSSS_MIXED_20",
    "OSSM_BASE",
    "ALL_MAIN_SKILLS",
]

[template]
required = []

[environment]
description = "Python workspace with agent_system.py - a Deep Agents (claude-agent-sdk) multi-agent system with 2 bugs: incorrect memory backend configuration preventing persistence, and subagent routing that fails to delegate tasks. claude-agent-sdk dependencies installed."
timeout_sec = 600

[validation]
test_scripts = "test_memory_v2.py"
target_artifacts = ["agent_system.py"]
timeout = 120
