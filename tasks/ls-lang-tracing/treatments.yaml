# Treatment configurations for ls-tracing task
#
# Tests whether separate skill names (langsmith-trace-py, langsmith-trace-ts)
# help Claude add LangSmith tracing more accurately than unified skill names.
#
# Original: tests/benchmarks/ls_languages/test_tracing.py

SEPARATE_NAMES:
  description: "Language-specific skill names (trace-py/ts, evaluator-py/ts, dataset-py/ts + noise)"
  claude_md: |
    # CRITICAL

    This project has skills with reference implementations. Before writing code, you must check the available skills and use relevant ones - this ensure you follow best practices.
  skills:
    - skill: langsmith_trace
      variant: py
      name: langsmith-trace-py
      suffix: true
    - skill: langsmith_trace
      variant: ts
      name: langsmith-trace-ts
      suffix: true
    - skill: langsmith_evaluator
      variant: py
      name: langsmith-evaluator-py
      suffix: true
    - skill: langsmith_evaluator
      variant: ts
      name: langsmith-evaluator-ts
      suffix: true
    - skill: langsmith_dataset
      variant: py
      name: langsmith-dataset-py
      suffix: true
    - skill: langsmith_dataset
      variant: ts
      name: langsmith-dataset-ts
      suffix: true
    - skill: langchain_basic
      name: langchain-basic
      noise: true

UNIFIED_BOTH:
  description: "Unified skills (trace/evaluator/dataset with all variants)"
  claude_md: |
    # CRITICAL

    This project has skills with reference implementations. Before writing code, you must check the available skills and use relevant ones - this ensure you follow best practices.
  skills:
    - skill: langsmith_trace
      variant: all
      name: langsmith-trace
    - skill: langsmith_evaluator
      variant: all
      name: langsmith-evaluator
    - skill: langsmith_dataset
      variant: all
      name: langsmith-dataset

UNIFIED_WITH_NOISE:
  description: "Unified skills + distractor noise skill"
  claude_md: |
    # CRITICAL

    This project has skills with reference implementations. Before writing code, you must check the available skills and use relevant ones - this ensure you follow best practices.
  skills:
    - skill: langsmith_trace
      variant: all
      name: langsmith-trace
    - skill: langsmith_evaluator
      variant: all
      name: langsmith-evaluator
    - skill: langsmith_dataset
      variant: all
      name: langsmith-dataset
    - skill: langchain_basic
      name: langchain-basic
      noise: true

UNIFIED_PY_ONLY:
  description: "Single skill with only Python content"
  claude_md: |
    # CRITICAL

    This project has skills with reference implementations. Before writing code, you must check the available skills and use relevant ones - this ensure you follow best practices.
  skills:
    - skill: langsmith_trace
      variant: py
      name: langsmith-trace

UNIFIED_TS_ONLY:
