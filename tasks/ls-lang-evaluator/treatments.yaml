# Treatment configurations for ls-evaluator task
#
# Tests whether separate skill names (langsmith-evaluator-py, langsmith-evaluator-ts)
# help Claude create evaluators in the correct language for each agent type.
#
# Original: tests/benchmarks/ls_languages/test_evaluators.py

SEPARATE_NAMES:
  description: "Language-specific skill names (evaluator-py/ts, trace-py/ts, dataset-py/ts + noise)"
  claude_md: |
    # Project Guidelines

    Before starting any coding task, check available project skills to find the best approach.

    ## General Principles

    - **Understand before building**: Query and inspect existing data structures before writing code that processes them
    - **Match schemas exactly**: Code should access the exact field names present in the data, not assumed names
    - **Use skill scripts**: Reference the scripts in skills for working patterns
  skills:
    - skill: langsmith_trace
      variant: py
      name: langsmith-trace-py
      suffix: true
    - skill: langsmith_trace
      variant: ts
      name: langsmith-trace-ts
      suffix: true
    - skill: langsmith_evaluator
      variant: py
      name: langsmith-evaluator-py
      suffix: true
    - skill: langsmith_evaluator
      variant: ts
      name: langsmith-evaluator-ts
      suffix: true
    - skill: langsmith_dataset
      variant: py
      name: langsmith-dataset-py
      suffix: true
    - skill: langsmith_dataset
      variant: ts
      name: langsmith-dataset-ts
      suffix: true
    - skill: langchain_basic
      name: langchain-basic
      noise: true

