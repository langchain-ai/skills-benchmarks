[metadata]
name = "lc-framework-qa-agent"
description = "Framework selection: build a basic react agent — Claude must pick create_agent (not create_react_agent or StateGraph)"
difficulty = "medium"
category = "langchain"
tags = ["langchain", "langgraph", "deep-agents", "framework-selection", "create_agent"]
default_treatments = ["CONTROL", "MAIN_SINGLE_PRIMER", "MAIN_FRAMEWORK_SELECTION", "MAIN_ECOSYSTEM_PRIMER"]

[template]
required = []

[environment]
description = "Clean Python workspace with LangChain, LangGraph, and Deep Agents installed. Claude must build a single component, choosing the right framework (LangChain vs LangGraph vs Deep Agents)."
dockerfile = "environment/Dockerfile"
timeout_sec = 180

[validation]
test_scripts = "test_qa_agent.py"
target_artifacts = ["agent.py"]
timeout = 120
