[metadata]
name = "lc-framework-approval-pipeline"
description = "Framework selection: build a deterministic-routing workflow — Claude must pick LangGraph StateGraph"
difficulty = "medium"
category = "langchain"
tags = ["langchain", "langgraph", "deep-agents", "framework-selection", "stategraph"]
default_treatments = ["CONTROL", "MAIN_SINGLE_PRIMER", "MAIN_FRAMEWORK_SELECTION", "MAIN_ECOSYSTEM_PRIMER"]

[template]
required = []

[environment]
description = "Clean Python workspace with LangChain, LangGraph, and Deep Agents installed. Claude must build a single component, choosing the right framework (LangChain vs LangGraph vs Deep Agents)."
dockerfile = "environment/Dockerfile"
timeout_sec = 180

[validation]
test_scripts = "test_approval_pipeline.py"
target_artifacts = ["agent.py"]
timeout = 120
