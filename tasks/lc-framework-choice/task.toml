[metadata]
name = "lc-framework-choice"
description = "Framework selection task: Claude picks appropriate frameworks for components of an app"
difficulty = "hard"
category = "langchain"
tags = ["langchain", "langgraph", "deep-agents", "framework-selection", "architecture"]
default_treatments = ["CONTROL", "MAIN_SINGLE_PRIMER", "MAIN_SPLIT_PRIMER_CLAUDE"]

[template]
required = []

[environment]
description = "Clean Python workspace with LangChain, LangGraph, and Deep Agents (claude-agent-sdk) all installed. Claude must design and build a multi-component application, choosing the right framework (LangChain vs LangGraph vs Deep Agents) for each component based on requirements."
dockerfile = "environment/Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_framework_v2.py"
target_artifacts = [
    "qa_agent.py",
    "approval_pipeline.py",
    "middleware_agent.py",
    "research_assistant.py",
    "personal_assistant.py",
]
timeout = 120
