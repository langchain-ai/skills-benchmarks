# Task Index (Reference Only)
#
# This file is for documentation purposes only.
# Tasks are auto-discovered from directories containing task.toml + instruction.md.
# All task metadata including default_treatments is defined in each task's task.toml.
#
# Difficulty levels:
#   easy   - Single-skill tasks with clear requirements
#   medium - Multi-step tasks or polyglot requirements
#   hard   - Multi-skill coordination with complex validation
#
# Categories:
#   langsmith  - LangSmith tracing, datasets, evaluators
#   langchain  - LangChain agents, dependencies, framework selection
#   langgraph  - LangGraph persistence, state, workflows
#   deepagents - Deep Agents memory, subagents, orchestration
