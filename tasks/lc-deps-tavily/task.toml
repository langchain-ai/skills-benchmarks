[metadata]
name = "lc-deps-tavily"
description = "Dependency confusion task: Claude fixes a broken project with wrong langchain deps and import paths"
difficulty = "medium"
category = "langchain"
tags = ["langchain", "dependencies", "tavily", "imports", "debugging"]
default_treatments = ["CONTROL", "ALL_MAIN_SKILLS", "MAIN_SINGLE_PRIMER", "MAIN_SPLIT_PRIMER_CLAUDE"]

[template]
required = []

[environment]
description = "Python workspace with a broken project: incorrect requirements.txt with outdated langchain-community deps, wrong import paths for Tavily tools, and missing langchain-openai. Claude must debug and fix dependency issues to make the search agent work."
dockerfile = "environment/Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_tavily_agent_v2.py"
target_artifacts = ["agent.py"]
timeout = 120
