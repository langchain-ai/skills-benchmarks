[metadata]
name = "oss-fix-lc-streaming"
description = "Fix multiple layered bugs in a chat application"
difficulty = "medium"
category = "langchain"
tags = ["streaming", "tools", "async", "bug-fix"]
default_treatments = [
    "CONTROL",
    "OSSS_LC_STREAMING_ONLY",
    "OSSS_LC_TOOLS_ONLY",
    "OSSS_LC_STREAMING_AND_TOOLS",
    "OSSS_ALL_LC",
    "OSSS_ALL_LG",
    "OSSS_MIXED_20",
    "OSSM_BASE",
    "ALL_MAIN_SKILLS",
]

[template]
required = []

[environment]
description = "Python workspace with chat_app.py - a LangChain chat application with 2 bugs: broken streaming output that doesn't flush tokens in real-time, and tool call handling that ignores tool results. LangChain and langchain-openai dependencies installed."
timeout_sec = 600

[validation]
test_scripts = "test_streaming.py"
target_artifacts = ["chat_app.py"]
timeout = 120
