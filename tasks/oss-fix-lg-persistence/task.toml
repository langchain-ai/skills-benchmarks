[metadata]
name = "oss-fix-lg-persistence"
description = "Fix persistence and state bugs in a LangGraph chatbot"
difficulty = "medium"
category = "langgraph"
tags = ["persistence", "state", "checkpointer", "reducer", "bug-fix"]
default_treatments = [
    "CONTROL",
    "OSSS_LG_PERSISTENCE_ONLY",
    "OSSS_LG_STATE_ONLY",
    "OSSS_LG_PERSISTENCE_AND_STATE",
    "OSSS_ALL_LG",
    "OSSS_ALL_LC",
    "OSSS_MIXED_20",
    "OSSM_BASE",
    "ALL_MAIN_SKILLS",
]

[template]
required = []

[environment]
description = "Python workspace with broken_agent.py - a LangGraph chatbot with 3 bugs: missing checkpointer configuration, incorrect thread_id usage, and state reducer issues. LangGraph, LangChain, and langgraph-checkpoint dependencies installed."
timeout_sec = 600

[validation]
test_scripts = "test_persistence_v2.py"
target_artifacts = ["broken_agent.py"]
timeout = 120
