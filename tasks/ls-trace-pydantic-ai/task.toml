[metadata]
name = "ls-trace-pydantic-ai"
description = "Add LangSmith tracing to a PydanticAI agent (per-framework reference-routing test)"
difficulty = "easy"
category = "langsmith"
tags = ["tracing", "pydantic-ai", "references", "routing"]
default_treatments = [
    "LS_MAIN_PY",
    "CONTROL",
]

[template]
required = ["run_id"]

[environment]
description = "Minimal PydanticAI agent without tracing. Claude must add LangSmith tracing per references/pydantic-ai.md."
dockerfile = "Dockerfile"
timeout_sec = 600

[validation]
test_scripts = "test_tracing.py"
target_artifacts = ["agent.py"]
timeout = 120
