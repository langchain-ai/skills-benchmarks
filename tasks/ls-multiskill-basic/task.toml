[metadata]
name = "ls-multiskill-basic"
description = "Create trajectory dataset from LangSmith traces"
difficulty = "medium"
category = "langsmith"
tags = ["multiskill", "trace", "dataset"]
default_treatments = ["LS_BASIC_PY", "LS_WORKFLOW_PY", "CONTROL"]

[template]
required = ["run_id"]

[environment]
description = "Clean Python workspace with langsmith SDK installed. Claude has access to a LangSmith project containing pre-existing traces from a SQL analytics agent. Task requires creating trajectory datasets from these traces."
dockerfile = "Dockerfile"
timeout_sec = 900

[validation]
# Validators that don't require arguments
# SkillScriptValidator requires script_patterns config - handled separately
validators = ["DatasetStructureValidator", "TrajectoryAccuracyValidator"]

[setup]
# Data handlers - upload traces when trace files exist
[[setup.data]]
pattern = "trace_*.jsonl"
handler = "upload_traces"
