# Treatment configurations for ls-multiskill-advanced task
#
# Tests skill synergy with 3 skills (trace + dataset + evaluator).
# Each treatment tests different combinations of skills, section selections,
# and CLAUDE.md configurations.

# Curated section lists (excludes detailed examples to stress test Claude)

_trace_curated_sections: &trace_curated_sections
  - frontmatter
  - oneliner
  - setup
  - trace_langchain_oss
  - traces_vs_runs
  - command_structure
  - filters

_dataset_curated_sections: &dataset_curated_sections
  - frontmatter
  - oneliner
  - setup
  - input_format
  - usage
  - extraction_priority
  - trace_hierarchy
  - dataset_types_overview

_evaluator_curated_sections: &evaluator_curated_sections
  - frontmatter
  - oneliner
  - setup
  - evaluator_format
  - evaluator_types
  - best_practices

# Baseline: Skills WITHOUT workflow hints, no CLAUDE.md (hardest - no cross-references)
LS_CLAUDE_ADVANCED_NONE:
  description: "Skills without workflow hints, no CLAUDE.md (no cross-references)"
  skills:
    - skill: langsmith_trace
      variant: py
      name: langsmith-trace
      included_sections: *trace_curated_sections
    - skill: langsmith_dataset
      variant: py
      name: langsmith-dataset
      included_sections: *dataset_curated_sections
    - skill: langsmith_evaluator
      variant: py
      name: langsmith-evaluator
      included_sections: *evaluator_curated_sections

# CLAUDE.md only: Workflow rules in CLAUDE.md, skills without hints
LS_CLAUDE_ADVANCED_WORKFLOW:
  description: "Workflow rules in CLAUDE.md, skills without hints"
  claude_md: |
    # Project Guidelines

    Before starting any coding task, check available project skills to find the best approach.

    ## LangSmith Skills

    This project has LangSmith skills for working with traces, datasets, and evaluators:

    - **langsmith-trace**: Query and analyze traces from LangSmith projects
    - **langsmith-dataset**: Generate datasets from trace data
    - **langsmith-evaluator**: Create evaluators for validating agent outputs

    Workflow:
    - Datasets require trace data (use trace skill to get data first)
    - Evaluators validate datasets (create dataset before evaluator)
    - Evaluators should use the same field structure as your dataset (e.g., if dataset has `expected_trajectory`, evaluator should read that field)
  skills:
    - skill: langsmith_trace
      variant: py
      name: langsmith-trace
      included_sections: *trace_curated_sections
    - skill: langsmith_dataset
      variant: py
      name: langsmith-dataset
      included_sections: *dataset_curated_sections
    - skill: langsmith_evaluator
      variant: py
      name: langsmith-evaluator
      included_sections: *evaluator_curated_sections

# Skills only: Workflow hints in skills (related_skills section), minimal CLAUDE.md
LS_CLAUDE_ADVANCED_MOVED_TO_SKILLS:
  description: "Workflow hints in skills, minimal CLAUDE.md"
  claude_md: |
    # Project Guidelines

    Before starting any coding task, check available project skills to find the best approach.
  skills:
    - skill: langsmith_trace
      variant: py
      name: langsmith-trace
      included_sections: *trace_curated_sections
      extra_included_sections:
        - |
          <related_skills>
          - **langsmith-dataset**: Generates evaluation datasets from trace data. Traces provide the raw execution data that datasets structure for testing.
          - **langsmith-evaluator**: Creates evaluators that validate agent outputs. Evaluators can check trajectories captured in traces.
          </related_skills>
    - skill: langsmith_dataset
      variant: py
      name: langsmith-dataset
      included_sections: *dataset_curated_sections
      extra_included_sections:
        - |
          <related_skills>
          - **langsmith-trace**: Queries and exports trace data. Datasets are built from trace data - traces contain the inputs, outputs, and tool calls that become dataset examples.
          - **langsmith-evaluator**: Creates evaluators that validate outputs. Evaluators run against datasets to measure performance.
          </related_skills>
    - skill: langsmith_evaluator
      variant: py
      name: langsmith-evaluator
      included_sections: *evaluator_curated_sections
      extra_included_sections:
        - |
          <related_skills>
          - **langsmith-trace**: Queries execution data. Traces show what tools were called, helping you understand what evaluators should check.
          - **langsmith-dataset**: Generates evaluation datasets. Evaluators validate the expected outputs defined in datasets.
          </related_skills>

