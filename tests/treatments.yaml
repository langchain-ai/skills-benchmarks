# Treatment configurations for benchmark experiments
#
# Treatments define skill configurations that can be combined with any task.
# Skills are loaded from skills/benchmarks/ with specified variants.
#
# Skill loading options:
#   variant: py | ts | all   - Which language variant to load
#   suffix: true | false     - Add language suffix to skill name (e.g., -py, -ts)
#   name: custom-name        - Override the skill name (default: directory name)
#   filter_related: true     - Remove <related_skills> sections (default: true)

# =============================================================================
# LANGSMITH POLYGLOT TREATMENTS (for ls-evaluator, ls-tracing tasks)
# =============================================================================

SEPARATE_NAMES:
  description: "Language-specific skill names (skill-py/ts for each)"
  claude_md: |
    # Project Guidelines

    Before starting any coding task, check available project skills to find the best approach.

    ## General Principles

    - **Understand before building**: Query and inspect existing data structures before writing code that processes them
    - **Match schemas exactly**: Code should access the exact field names present in the data, not assumed names
    - **Use skill scripts**: Reference the scripts in skills for working patterns
  skills:
    # Each skill type loaded twice with language-specific names
    - skill: langsmith_trace
      variant: py
      name: langsmith-trace-py
      suffix: true
    - skill: langsmith_trace
      variant: ts
      name: langsmith-trace-ts
      suffix: true
    - skill: langsmith_evaluator
      variant: py
      name: langsmith-evaluator-py
      suffix: true
    - skill: langsmith_evaluator
      variant: ts
      name: langsmith-evaluator-ts
      suffix: true
    - skill: langsmith_dataset
      variant: py
      name: langsmith-dataset-py
      suffix: true
    - skill: langsmith_dataset
      variant: ts
      name: langsmith-dataset-ts
      suffix: true
    - skill: langchain_basic
      name: langchain-basic
      noise: true

UNIFIED_BOTH:
  description: "Unified skills with all language variants"
  claude_md: |
    # Project Guidelines

    Before starting any coding task, check available project skills to find the best approach.

