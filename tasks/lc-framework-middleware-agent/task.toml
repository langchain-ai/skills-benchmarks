[metadata]
name = "lc-framework-middleware-agent"
description = "Framework selection: build an agent with pre/post hooks — Claude must pick create_agent (or create_deep_agent), NOT LangGraph"
difficulty = "medium"
category = "langchain"
tags = ["langchain", "langgraph", "deep-agents", "framework-selection", "middleware"]
default_treatments = ["CONTROL", "MAIN_SINGLE_PRIMER", "MAIN_FRAMEWORK_SELECTION", "MAIN_ECOSYSTEM_PRIMER"]

[template]
required = []

[environment]
description = "Clean Python workspace with LangChain, LangGraph, and Deep Agents installed. Claude must build a single component, choosing the right framework (LangChain vs LangGraph vs Deep Agents)."
dockerfile = "environment/Dockerfile"
timeout_sec = 180

[validation]
test_scripts = "test_middleware_agent.py"
target_artifacts = ["agent.py"]
timeout = 120
