[metadata]
name = "ls-multiskill-basic"
description = "Create trajectory dataset from LangSmith traces"
difficulty = "medium"
category = "langsmith"
tags = ["multiskill", "trace", "dataset"]

[template]
required = ["run_id"]

[environment]
dockerfile = "Dockerfile"
timeout_sec = 900

[validation]
# Validators that don't require arguments
# SkillScriptValidator requires script_patterns config - handled separately
validators = ["DatasetStructureValidator", "TrajectoryAccuracyValidator"]
