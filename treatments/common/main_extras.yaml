# Main skill primer treatments
#
# Each is all 13 main skills plus one primer/starter skill, to test whether a
# primer that nudges skill-invocation order changes outcomes.
#
#   MAIN_SINGLE_PRIMER       -> + langchain-oss-primer
#   MAIN_FRAMEWORK_SELECTION -> + framework-selection
#   MAIN_ECOSYSTEM_PRIMER    -> + ecosystem-primer

MAIN_SINGLE_PRIMER:
  description: "All 13 main skills + langchain-oss-primer"
  skills:
    - main/langsmith-trace
    - main/langsmith-dataset
    - main/langsmith-evaluator
    - main/langchain-dependencies
    - main/langchain-fundamentals
