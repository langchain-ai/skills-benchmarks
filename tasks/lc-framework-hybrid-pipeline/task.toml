[metadata]
name = "lc-framework-hybrid-pipeline"
description = "Framework selection: build a Deep Agents orchestrator + LangGraph sub-workflow — Claude must use create_deep_agent + CompiledSubAgent"
difficulty = "hard"
category = "langchain"
tags = ["langchain", "langgraph", "deep-agents", "framework-selection", "compiled-subagent"]
default_treatments = ["CONTROL", "MAIN_SINGLE_PRIMER", "MAIN_FRAMEWORK_SELECTION", "MAIN_ECOSYSTEM_PRIMER"]

[template]
required = []

[environment]
description = "Clean Python workspace with LangChain, LangGraph, and Deep Agents installed. Claude must build a single component, choosing the right framework (LangChain vs LangGraph vs Deep Agents)."
dockerfile = "environment/Dockerfile"
timeout_sec = 180

[validation]
test_scripts = "test_hybrid_pipeline.py"
target_artifacts = ["agent.py"]
timeout = 120
