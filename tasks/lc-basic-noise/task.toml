[metadata]
name = "lc-basic-noise"
description = "Tests skill retention when distracted by unrelated noise tasks"
difficulty = "medium"
category = "langchain"
tags = ["langchain", "agents", "noise", "skill-retention"]
default_treatments = ["CONTROL", "LCC_NOISE_NONE", "LCC_NOISE_1", "LCC_NOISE_2", "LCC_NOISE_3"]

[template]
required = []

[environment]
description = "Python workspace with chinook.db (music store SQLite database with artists, albums, tracks, invoices, customers). LangChain, LangGraph, and langsmith dependencies pre-installed. Same as lc-basic but with distracting noise tasks injected."
dockerfile = "Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_agents.py"
target_artifacts = ["sql_agent_1.py", "search_agent.py"]
timeout = 120
