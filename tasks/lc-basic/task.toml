[metadata]
name = "lc-basic"
description = "Basic SQL analytics agent task for testing LangChain skill effectiveness"
difficulty = "medium"
category = "langchain"
tags = ["langchain", "agents", "sql"]
default_treatments = [
    "CONTROL",
    "LCC_CLAUDE_NONE",
    "LCC_CLAUDE_SKILL_ONLY",
    "LCC_CLAUDE_GUIDANCE",
    "LCC_CLAUDE_ALL",
    "LCC_GUIDANCE_POS",
    "LCC_GUIDANCE_NEG",
]

[template]
required = []

[environment]
description = "Python workspace with chinook.db (music store SQLite database with artists, albums, tracks, invoices, customers). LangChain, LangGraph, and langsmith dependencies pre-installed. Claude must build a SQL analytics agent from scratch."
dockerfile = "environment/Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_sql_agent_v2.py"
target_artifacts = ["sql_agent_1.py"]
timeout = 120
