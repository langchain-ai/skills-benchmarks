[metadata]
name = "ls-lang-tracing"
description = "Add LangSmith tracing to Python and TypeScript agents"
difficulty = "easy"
category = "langsmith"
tags = ["tracing", "polyglot", "python", "typescript"]
default_treatments = [
    "LS_BASIC_PY",
    "LS_BASIC_TS",
    "LS_BASIC_BOTH",
    "LS_WORKFLOW_PY",
    "LS_WORKFLOW_TS",
    "LS_WORKFLOW_BOTH",
    "CONTROL",
]

[template]
required = ["run_id"]

[environment]
description = "Polyglot workspace with backend/ (Python SQL analytics agent) and frontend/ (TypeScript support chatbot). Neither agent has tracing enabled. langsmith SDK installed for both Python and TypeScript. Claude must add LangSmith tracing to both agents."
dockerfile = "Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_tracing.py"
target_artifacts = ["backend/sql_agent.py", "frontend/support_bot.ts"]
timeout = 120
